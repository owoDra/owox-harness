services:
  dev:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
      args:
        NODE_MAJOR: ${NODE_MAJOR:-22}
    image: ${COMPOSE_PROJECT_NAME:-monorepo}-devcontainer:local
    working_dir: /workspace
    init: true
    command: sleep infinity
    network_mode: host
    env_file:
      - ./.env
      - ./.env.local
    environment:
      TZ: ${TZ:-Asia/Tokyo}
      COMPOSE_FILE: /workspace/.devcontainer/compose.yml
      CODEX_HOME: /home/vscode/.codex
      NPM_CONFIG_PREFIX: /home/vscode/.npm-global
      PNPM_HOME: /home/vscode/.local/share/pnpm
      PNPM_STORE_DIR: /pnpm/store
      UV_CACHE_DIR: /home/vscode/.cache/uv
      PIP_CACHE_DIR: /home/vscode/.cache/pip
      PIPX_HOME: /home/vscode/.local/pipx
      PIPX_BIN_DIR: /home/vscode/.local/bin
      PATH: /home/vscode/.npm-global/bin:/home/vscode/.local/bin:/home/vscode/.local/share/pnpm:${PATH}
    volumes:
      - ..:/workspace
      - codex-home:/home/vscode/.codex
      - npm-global:/home/vscode/.npm-global
      - user-local:/home/vscode/.local
      - user-cache:/home/vscode/.cache
      - pnpm-store:/pnpm/store
    extra_hosts:
      - host.docker.internal:host-gateway

  db:
    image: postgres:16
    profiles: [ "db" ]
    network_mode: host
    shm_size: 256m
    env_file:
      - ./.env
      - ./.env.local
    environment:
      TZ: ${TZ:-Asia/Tokyo}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    command: [ "postgres", "-p", "${POSTGRES_PORT:-5432}" ]
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    profiles: [ "cache" ]
    network_mode: host
    command: [ "redis-server", "--port", "${REDIS_PORT:-6379}" ]
    volumes:
      - redisdata:/data

volumes:
  codex-home:
  npm-global:
  user-local:
  user-cache:
  pnpm-store:
  workspace-node-modules:
  workspace-venv:
  pgdata:
  redisdata:
